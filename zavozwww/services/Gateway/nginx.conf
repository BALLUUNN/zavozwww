#user  nobody;

error_log  /var/log/nginx/error.log  warn;

pid        /var/run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;

    keepalive_timeout  65;

    client_max_body_size 16M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=recsys_cache:10m max_size=1g inactive=60m use_temp_path=off;

    upstream auth_service {
        server auth_service:8080;
        keepalive 16; 
    }

    upstream social_service {
        server social_service:8080;
        keepalive 16;
    }

    upstream rec_system {
        server rec_system:8000;
        keepalive 16;
    }

    server {
        listen       80;
        server_name  localhost; 

        # limit_req zone=one burst=20 nodelay;

        # CORS Configuration
        set $cors_origin "";
        if ($http_origin ~* "^http://127.0.0.1:5501$") {
            set $cors_origin $http_origin;
        }
        if ($http_origin ~* "^http://localhost:5501$") {
            set $cors_origin $http_origin;
        }
        if ($http_origin ~* "^http://127.0.0.1:5500$") {
            set $cors_origin $http_origin;
        }
        if ($http_origin ~* "^http://localhost:5500$") {
            set $cors_origin $http_origin;
        }

        # Handle Preflight OPTIONS
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
        add_header Content-Security-Policy "default-src 'self'";
        
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-CSRF-Token, X-User-ID' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        location /filmbuddy/ {
            proxy_pass http://auth_service;

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /social/ {
            proxy_pass http://social_service;

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /recsys/ {
            proxy_pass http://rec_system/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_cache recsys_cache;
            proxy_cache_valid 200 10m;
            proxy_cache_valid 404 1m;
            proxy_cache_methods GET HEAD POST;
            proxy_cache_key "$scheme$request_method$host$request_uri$request_body";
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_lock on;

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            add_header Content-Type text/plain;
            return 200 'API Server is running. Use /filmbuddy/ endpoints.';
        }
    }
}