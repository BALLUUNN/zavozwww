version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: auth_user
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  adminer:
    image: adminer
    restart: always
    container_name: adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      - app-network

  mailpit:
    image: axllent/mailpit
    restart: always
    container_name: mailpit
    ports:
      - "8025:8025" 
      - "1025:1025"
    networks:
      - app-network

  auth_service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: auth_service
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: auth_user
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_SSLMODE: disable
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_USER: "test"
      SMTP_PASSWORD: "test"
      SMTP_FROM: "AuthService <no-reply@auth.com>"
      EMAIL_TEMPLATES_DIR: "./templates"
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_TTL: "3600"
      APP_CONFIG_PATH: "./config/config.yaml"
      HOST: "0.0.0.0"
      PORT: "8080"
    ports:
      - "8080:8080"
    networks:
      - app-network

  api_gateway:
    image: nginx:stable-alpine
    container_name: api_gateway
    ports:
      - "80:80"
    volumes:
      - ../Gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth_service
    networks:
      - app-network

networks:
  app-network:
    name: filmbuddy-network
    driver: bridge

volumes:
  postgres_data: